name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Empty string → relative URLs (/api/graph). CDN routes /api/* to Cloud Run.
          NEXT_PUBLIC_API_URL: ""

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCS
        run: |
          gsutil -m rsync -r -d -x '^(graph|activity-feed|now|currently)\.json$|^Resume_Aditya_Tapshalkar\.pdf$|^resume_parsed\.md$' out/ gs://${{ vars.GCS_BUCKET }}/

      - name: Publish clean URLs
        # GCS CDN backend accesses the bucket as an object store — /about resolves
        # to an object named "about", not "about.html". Copy each page to an
        # extensionless path so direct loads and refreshes work.
        env:
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          python3 - <<'EOF'
          import subprocess, os
          from pathlib import Path
          bucket = os.environ["GCS_BUCKET"]
          skip = {"index.html", "404.html", "_not-found.html"}
          for p in sorted(Path("out").rglob("*.html")):
              if p.name in skip:
                  continue
              clean = str(p.relative_to("out").with_suffix(""))
              print(f"  {p} → gs://{bucket}/{clean}")
              subprocess.run(
                  ["gsutil", "-h", "Content-Type:text/html;charset=utf-8",
                   "cp", str(p), f"gs://{bucket}/{clean}"],
                  check=True,
              )
          EOF

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --path "/*" \
            --async \
            --global
