name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Empty string → relative URLs (/api/graph). CDN routes /api/* to Cloud Run.
          NEXT_PUBLIC_API_URL: ""

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCS
        run: |
          gsutil -m rsync -r -d -x '^(graph|activity-feed|now|currently)\.json$|^Resume_Aditya_Tapshalkar\.pdf$|^resume_parsed\.md$' out/ gs://${{ vars.GCS_BUCKET }}/

      - name: Install GCS Python client
        run: pip install --quiet google-cloud-storage

      - name: Publish clean URLs
        # GCS CDN backend accesses the bucket as an object store — /about resolves
        # to an object named "about", not "about.html". Copy each page to an
        # extensionless path so direct loads and refreshes work.
        env:
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
        run: |
          python3 - <<'EOF'
          import os
          from pathlib import Path
          from google.cloud import storage

          bucket_name = os.environ["GCS_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)
          skip = {"index.html", "404.html", "_not-found.html"}

          for p in sorted(Path("out").rglob("*.html")):
              if p.name in skip:
                  continue
              clean = str(p.relative_to("out").with_suffix(""))
              print(f"  {p} → gs://{bucket_name}/{clean}")
              blob = bucket.blob(clean)
              blob.upload_from_filename(
                  str(p),
                  content_type="text/html;charset=utf-8",
              )
              blob.cache_control = "public, max-age=3600"
              blob.patch()
              print(f"    ✓ uploaded ({p.stat().st_size} bytes)")
          EOF

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --path "/*" \
            --async \
            --global
