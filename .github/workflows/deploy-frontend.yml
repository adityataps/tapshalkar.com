name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Empty string → relative URLs (/api/graph). CDN routes /api/* to Cloud Run.
          NEXT_PUBLIC_API_URL: ""

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to GCS
        run: |
          gsutil -m rsync -r -d -x '^(graph|activity-feed|now|currently)\.json$|^Resume_Aditya_Tapshalkar\.pdf$' out/ gs://${{ vars.GCS_BUCKET }}/

      - name: Publish clean URLs
        # GCS CDN backend does not infer .html extensions — copy each page to an
        # extensionless path so /about works as well as /about.html.
        run: |
          find out -name "*.html" \
            ! -name "index.html" ! -name "404.html" ! -name "_not-found.html" \
            -printf '%P\n' | while IFS= read -r rel; do
              clean="${rel%.html}"
              gsutil cp "out/$rel" "gs://${{ vars.GCS_BUCKET }}/$clean"
              gsutil setmeta -h "Content-Type:text/html;charset=utf-8" \
                "gs://${{ vars.GCS_BUCKET }}/$clean"
          done

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache ${{ vars.CDN_URL_MAP }} \
            --path "/*" \
            --async \
            --global
